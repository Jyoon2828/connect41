<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>생명과학 아이디어 뱅크</title>
  
  <!-- Tailwind CSS (디자인) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (JSX 코드 변환기) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(15px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    .fade-in { animation: fadeIn 0.6s ease-out forwards; }
  </style>
</head>
<body class="bg-green-50 font-sans min-h-screen">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const Icons = {
      Leaf: () => <svg className="w-8 h-8 text-green-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>,
      Search: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
      Lightbulb: ({className="w-5 h-5 text-yellow-500"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>,
      Sprout: () => <svg className="w-6 h-6 text-green-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/></svg>,
      Droplets: () => <svg className="w-6 h-6 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/></svg>,
      Microscope: () => <svg className="w-6 h-6 text-purple-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/></svg>,
      Check: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
      Copy: () => <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
    };

    function ExploreSection() {
      const categories = [
        {
          id: 'fungi', title: '균류 (곰팡이, 버섯)', icon: <Icons.Sprout />, color: 'bg-green-100',
          items: [
            { emoji: '💊', name: '질병을 치료하는 마법의 약, 페니실린', desc: '푸른곰팡이 주변에는 세균이 자라지 못한다는 사실을 관찰하여 세계 최초의 항생제인 "페니실린"을 만들었어요. 이 약 덕분에 폐렴 등 세균 감염으로 인한 수많은 생명을 구할 수 있었답니다.' },
            { emoji: '📦', name: '스티로폼을 대신하는 버섯 포장재', desc: '버섯의 뿌리 부분인 "균사체"와 톱밥, 옥수수 껍질 같은 농업 폐기물을 섞어 틀에 넣고 키우면 아주 단단해져요. 썩지 않는 스티로폼과 달리 땅에 묻으면 한 달 안에 100% 자연 분해되는 친환경 포장재랍니다.' },
            { emoji: '👜', name: '동물 보호와 환경을 생각한 버섯 가죽', desc: '소나 돼지의 가죽 대신 버섯 균사체를 배양해서 가죽처럼 질기고 부드러운 소재를 만들 수 있어요. 동물을 해치지 않고, 가죽을 만드는 과정에서 나오는 나쁜 화학물질과 탄소 배출도 크게 줄일 수 있습니다.' },
            { emoji: '🍞', name: '맛있는 빵을 부풀리는 마술사, 효모', desc: '눈에 보이지 않는 아주 작은 균류인 "효모"는 밀가루 반죽 속의 당분을 먹고 이산화탄소 가스를 내뿜어요. 이 가스 덕분에 반죽에 수많은 구멍이 생기면서 우리가 먹는 빵이 푹신푹신하고 부드럽게 만들어집니다.' },
          ]
        },
        {
          id: 'protists', title: '원생생물 (해조류, 미세조류)', icon: <Icons.Droplets />, color: 'bg-blue-100',
          items: [
            { emoji: '⛽', name: '바다에서 온 깨끗한 에너지, 바이오 연료', desc: '바다에 사는 아주 작은 미세조류 중에는 몸속에 기름을 만들어내는 종류가 있어요. 이 미세조류를 대량으로 키워서 기름을 짜내면 자동차나 비행기를 움직일 수 있는 친환경 연료가 됩니다.' },
            { emoji: '🥤', name: '바다를 지키는 해조류 종이 빨대', desc: '플라스틱 빨대가 바다거북의 코에 꽂히는 등 환경 문제가 심각해요. 그래서 우뭇가사리 같은 원생생물(해조류)을 이용해 빨대를 만듭니다. 일반 종이 빨대보다 단단하고, 바닷물에 들어가면 미생물에 의해 18시간 만에 완전히 분해된답니다.' },
            { emoji: '💧', name: '자연으로 돌아가는 먹을 수 있는 친환경 물병', desc: '페트병 쓰레기를 줄이기 위해, 우뭇가사리와 같은 해조류에서 추출한 물질로 물방울 모양의 얇은 막을 만들었어요. 이 막 안에 물을 담아서 다 마신 후 껍질째 먹을 수도 있고, 그냥 버려도 몇 주 안에 자연스럽게 썩어 없어져요.' },
            { emoji: '✨', name: '반짝반짝 치석을 제거하는 치약 속 규조류', desc: '바다나 강에 사는 원생생물인 규조류는 유리처럼 아주 단단한 껍데기를 가지고 있어요. 이 껍데기가 쌓여 만들어진 흙(규조토)은 매우 미세하고 거칠어서, 치약에 섞어 치아의 찌든 때를 벗겨내는 연마제 역할을 하거나 화장품 재료로 쓰입니다.' },
          ]
        },
        {
          id: 'bacteria', title: '세균 (박테리아)', icon: <Icons.Microscope />, color: 'bg-purple-100',
          items: [
            { emoji: '🐛', name: '자연을 지키는 착한 일꾼, 생물 농약', desc: '독한 화학 농약 대신, 특정 해충에게만 병을 일으키는 착한 세균(비티균 등)을 이용해 농작물을 보호해요. 사람이나 다른 동물, 그리고 식물에는 전혀 해를 끼치지 않아 안전하고 환경오염을 줄일 수 있습니다.' },
            { emoji: '💡', name: '어둠을 밝히는 전기 없는 세균 가로등', desc: '심해어의 몸속이나 바다에 살며 스스로 빛을 내는 "발광 세균"이 있어요. 이 세균들을 유리관에 모아 키우면 전기를 연결하지 않아도 밤거리를 환하게 밝히는 친환경 조명을 만들 수 있어 현재 세계 곳곳에서 연구 중이랍니다.' },
            { emoji: '♻️', name: '플라스틱 쓰레기를 냠냠 먹어치우는 세균', desc: '수백 년 동안 썩지 않아 지구를 병들게 하는 페트(PET)병을 마치 음식처럼 분해해서 먹어치우는 신기한 세균(이데오넬라 사카이엔시스 등)이 발견되었어요. 앞으로 플라스틱 쓰레기 문제를 해결할 중요한 열쇠가 될 거예요.' },
            { emoji: '🥛', name: '우리 몸의 건강 지킴이, 유산균', desc: '유산균은 우유에 들어가 우리가 즐겨 먹는 새콤달콤한 요구르트나 치즈를 만들어 주는 세균이에요. 우리 장 속에 살면서 음식물의 소화를 돕고, 나쁜 병균들이 몸속에서 자라지 못하게 막아주어 건강을 튼튼하게 지켜줍니다.' },
          ]
        }
      ];

      return (
        <div className="space-y-12 fade-in">
          <div className="text-center space-y-2">
            <h2 className="text-3xl font-bold text-gray-800">우리 생활 속 생명과학 찾기</h2>
            <p className="text-gray-600">균류, 원생생물, 세균이 우리에게 어떤 도움을 주는지 조사해 봅시다.</p>
          </div>
          {categories.map((category) => (
            <div key={category.id} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
              <div className={`${category.color} px-6 py-4 flex items-center gap-3 border-b border-gray-100`}>
                {category.icon}
                <h3 className="text-xl font-bold text-gray-800">{category.title}</h3>
              </div>
              <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                {category.items.map((item, idx) => (
                  <div key={idx} className="flex gap-4 p-5 rounded-xl bg-gray-50 hover:bg-gray-100 transition-colors border border-gray-100 h-full">
                    <div className="text-4xl flex-shrink-0 mt-1">{item.emoji}</div>
                    <div>
                      <h4 className="font-bold text-gray-800 text-[17px] mb-2 break-keep">{item.name}</h4>
                      <p className="text-gray-600 leading-relaxed text-[14px] break-keep">{item.desc}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    }

    function IdeaSection() {
      const [formData, setFormData] = useState({ name: '', organism: '균류 (곰팡이, 버섯)', feature: '', benefit: '', slogan: '' });
      const [isSubmitted, setIsSubmitted] = useState(false);
      const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });
      const handleTagClick = (fieldName, textToAdd) => setFormData(prev => ({ ...prev, [fieldName]: prev[fieldName] ? `${prev[fieldName]} ${textToAdd}` : textToAdd }));
      const handleCopy = () => {
        const textToCopy = `[나의 생물 발명품 기획서]\n💡 발명품 이름: ${formData.name}\n🔬 활용한 생물: ${formData.organism}\n📝 생물의 특징: ${formData.feature}\n🌍 환경/생활에 주는 도움: ${formData.benefit}\n📢 홍보 문구: ${formData.slogan}`.trim();
        const textArea = document.createElement("textarea");
        textArea.value = textToCopy;
        document.body.appendChild(textArea);
        textArea.select();
        try { document.execCommand('copy'); alert('기획서가 복사되었습니다!'); } catch (err) {}
        document.body.removeChild(textArea);
      };

      return (
        <div className="space-y-10 fade-in">
          <div className="bg-blue-50 rounded-2xl p-6 md:p-8">
            <div className="flex items-center gap-2 mb-6"><Icons.Lightbulb className="w-8 h-8 text-yellow-500" /><h2 className="text-2xl font-bold text-gray-800">반짝반짝 아이디어 모음</h2></div>
            <p className="text-gray-700 mb-6">친구들은 생물의 특징을 이용해서 어떤 물건을 상상했을까요? 참고해서 나만의 아이디어를 떠올려 보세요.</p>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div className="bg-white p-5 rounded-xl shadow-sm border border-blue-100 flex flex-col items-center text-center"><span className="text-4xl mb-3">🍔</span><h3 className="font-bold text-lg mb-2">버섯 고기 샌드위치</h3><p className="text-sm text-gray-600">"고기 맛이 나는 버섯! 지구 온난화를 막아주는 착한 고기예요."</p></div>
              <div className="bg-white p-5 rounded-xl shadow-sm border border-blue-100 flex flex-col items-center text-center"><span className="text-4xl mb-3">🧃</span><h3 className="font-bold text-lg mb-2">원생생물 종이 빨대</h3><p className="text-sm text-gray-600">"플라스틱 놉! 바다에 버려져도 안전하게 분해되어 자연으로 돌아가요."</p></div>
              <div className="bg-white p-5 rounded-xl shadow-sm border border-blue-100 flex flex-col items-center text-center"><span className="text-4xl mb-3">🏮</span><h3 className="font-bold text-lg mb-2">살아있는 세균 가로등</h3><p className="text-sm text-gray-600">"전기가 필요 없어요! 스스로 빛을 내는 세균이 밤거리를 지켜줘요."</p></div>
            </div>
          </div>
          <div className="bg-white rounded-2xl shadow-lg border border-gray-200 overflow-hidden">
            <div className="bg-gradient-to-r from-green-500 to-teal-500 px-6 py-4"><h2 className="text-2xl font-bold text-white flex items-center gap-2">✏️ 나만의 생물 발명품 기획하기</h2></div>
            <div className="p-6 md:p-8 flex flex-col lg:flex-row gap-8 items-stretch">
              <div className="flex-1 space-y-5">
                <div><label className="block text-sm font-bold text-gray-700 mb-1">발명품 이름은 무엇인가요?</label><input type="text" name="name" value={formData.name} onChange={handleChange} placeholder="예: 슈퍼 파워 분해 지우개" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" /></div>
                <div><label className="block text-sm font-bold text-gray-700 mb-1">어떤 생물을 활용할 건가요?</label><select name="organism" value={formData.organism} onChange={handleChange} className="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none bg-white"><option value="균류 (곰팡이, 버섯)">균류 (곰팡이, 버섯)</option><option value="원생생물">원생생물 (해조류 등)</option><option value="세균">세균</option></select></div>
                <div><label className="block text-sm font-bold text-gray-700 mb-1">그 생물의 어떤 특징을 이용했나요?</label><textarea name="feature" value={formData.feature} onChange={handleChange} rows="2" className="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none resize-none mb-2"></textarea><div className="flex flex-wrap gap-2"><span className="text-xs text-gray-500">💡 추천(클릭):</span><button onClick={() => handleTagClick('feature', '플라스틱을 분해하는 특징')} className="text-xs bg-gray-100 hover:bg-green-100 px-2 py-1 rounded transition-colors border">플라스틱 분해</button><button onClick={() => handleTagClick('feature', '스스로 빛을 내는 특징')} className="text-xs bg-gray-100 hover:bg-green-100 px-2 py-1 rounded transition-colors border">스스로 빛을 냄</button></div></div>
                <div><label className="block text-sm font-bold text-gray-700 mb-1">지구 환경이나 우리 생활에 어떤 도움이 되나요?</label><textarea name="benefit" value={formData.benefit} onChange={handleChange} rows="2" className="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none resize-none mb-2"></textarea><div className="flex flex-wrap gap-2"><span className="text-xs text-gray-500">💡 추천(클릭):</span><button onClick={() => handleTagClick('benefit', '쓰레기를 줄일 수 있어요.')} className="text-xs bg-gray-100 hover:bg-blue-100 px-2 py-1 rounded transition-colors border">쓰레기 감소</button><button onClick={() => handleTagClick('benefit', '전기를 절약할 수 있어요.')} className="text-xs bg-gray-100 hover:bg-blue-100 px-2 py-1 rounded transition-colors border">전기 절약</button></div></div>
                <button onClick={() => setIsSubmitted(true)} className="w-full bg-gray-800 text-white font-bold py-3 rounded-xl transition-colors">기획서 완성하기</button>
              </div>
              <div className="flex-1">
                <div className={`h-full border-2 border-dashed rounded-2xl p-6 flex flex-col justify-center ${isSubmitted ? 'border-green-400 bg-green-50' : 'border-gray-300 bg-gray-50'}`}>
                  {!isSubmitted ? <div className="text-center text-gray-400"><Icons.Lightbulb className="w-16 h-16 mx-auto mb-4 opacity-50" /><p>왼쪽에 내용을 입력하고<br/>'기획서 완성하기'를 눌러주세요!</p></div> :
                    <div className="bg-white p-6 rounded-xl shadow-md border border-green-200 h-full relative fade-in">
                      <h3 className="text-2xl font-black text-center text-gray-800 mb-6">{formData.name || '이름 없는 발명품'}</h3>
                      <div className="space-y-4 text-sm text-gray-700">
                        <p><strong>활용 생물 :</strong> {formData.organism}</p>
                        <p><strong>생물 특징 :</strong> {formData.feature || '내용 없음'}</p>
                        <p><strong>기대 효과 :</strong> {formData.benefit || '내용 없음'}</p>
                      </div>
                      <button onClick={handleCopy} className="w-full mt-6 bg-white border border-gray-300 py-2 rounded-lg text-sm shadow-sm">내용 복사하기</button>
                    </div>
                  }
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab] = useState('explore');
      return (
        <div>
          <header className="bg-white shadow-sm sticky top-0 z-10">
            <div className="max-w-5xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex justify-between items-center">
              <div className="flex items-center gap-2"><Icons.Leaf /><h1 className="text-2xl font-extrabold text-gray-800">생명과학 아이디어 뱅크</h1></div>
            </div>
          </header>
          <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
            <div className="flex space-x-2 bg-green-100/50 p-1 rounded-xl">
              <button onClick={() => setActiveTab('explore')} className={`flex-1 py-3 font-bold rounded-lg ${activeTab === 'explore' ? 'bg-white text-green-700' : 'text-gray-500'}`}>생물 탐험관 (조사하기)</button>
              <button onClick={() => setActiveTab('idea')} className={`flex-1 py-3 font-bold rounded-lg ${activeTab === 'idea' ? 'bg-white text-blue-700' : 'text-gray-500'}`}>발명 아이디어관 (기획하기)</button>
            </div>
          </div>
          <main className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 mb-12">{activeTab === 'explore' ? <ExploreSection /> : <IdeaSection />}</main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
